version: "3"
services:
    web:
      build:
        context: web
      restart: unless-stopped

    minio:
      image: minio/minio
      ports:
        - "9000:9000"
        - "9001:9001"
      environment:
        MINIO_ROOT_USER: minioadmin
        MINIO_ROOT_PASSWORD: minioadmin
      volumes:
        - minio_data:/data
      command: server /data --console-address ":9001"
      restart: unless-stopped

    nginx:
      image: nginx:1-alpine
      ports:
        - "80:80"
      depends_on:
        - web
      volumes:
        - "./server/nginx.conf:/etc/nginx/nginx.conf:ro"
      restart: unless-stopped

volumes:
  minio_data:
